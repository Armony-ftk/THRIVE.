<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrive.com - settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <nav>
        <h1 id="logo">thrive</h1>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Goals</a></li>
            <li><a href="#">Daily Tasks</a></li>
            <li><a href="#">Progress</a></li>
            <li><a href="#">Thrive with AI</a></li>
            <li><a href="#">profile</a></li>
            <li><a href="#">settings</a></li>
        </ul>
    </nav>

    <div class="container">

  
    <div class="settings">
    <h1>Settings</h1>

     <div class="section">
      <h2>Appearance</h2>
      <label><input type="checkbox"> Dark Mode</label>
    </div>

     <div class="section">
      <h2>Notifications</h2>
      <label><input type="checkbox"> Email Alerts</label>
      <label><input type="checkbox"> Push Notifications</label>
    </div>

     <div class="section">
      <h2>Accessibility</h2>
      <p>Text size</p>
      <label><input type="radio" name="text-size"> Small</label>
      <label><input type="radio" name="text-size"> Large</label>
    </div>

    <div class="save">
      <button>Save Changes</button>
    </div>

    </div>
  </div>
</body>
</html>
