<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thrive - Forgot Password</title>
  <link rel="stylesheet" href="passwordReset.css">
</head>
<body>
  <div class="split-container">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="form-box">
        <h1>Reset Password</h1>
        <p>Enter your email to reset your password</p>
        <form>
          <input type="email" placeholder="Email" id="reset-email" required>
          <button type="submit">Send Reset Link</button>
        </form>
        <a href="login.html" class="link">Back to Login</a>
        <p class="terms">By continuing, you agree to Thrive’s Terms of Service, Privacy Policy, and Cookie Use. <a href="terms.html" target="_blank"></a></p>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="welcome">
        <h2>Forgot your password?</h2>
        <p>No worries, enter your email and we’ll send you a reset link.</p>
      </div>
    </div>
  </div>
  <script src="passwordReset.js"></script>
</body>
</html>
